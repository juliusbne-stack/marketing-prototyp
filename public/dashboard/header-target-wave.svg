<svg xmlns="http://www.w3.org/2000/svg" width="560" height="280" viewBox="0 0 560 280" fill="none">
  <defs>
    <linearGradient id="waveBack" x1="20" y1="160" x2="540" y2="70" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#DDF6F8" stop-opacity="0"/>
      <stop offset="22%" stop-color="#C8EEF4" stop-opacity="0.55"/>
      <stop offset="58%" stop-color="#A9E4EE" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#D0F1F6" stop-opacity="0.2"/>
    </linearGradient>
    <linearGradient id="waveMid" x1="60" y1="185" x2="520" y2="95" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#E5F9F6" stop-opacity="0"/>
      <stop offset="28%" stop-color="#B8EFE8" stop-opacity="0.6"/>
      <stop offset="68%" stop-color="#8FDCE8" stop-opacity="0.75"/>
      <stop offset="100%" stop-color="#C9F2F7" stop-opacity="0.18"/>
    </linearGradient>
    <linearGradient id="waveFront" x1="100" y1="205" x2="500" y2="130" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#ECFBF8" stop-opacity="0"/>
      <stop offset="32%" stop-color="#A6EBE3" stop-opacity="0.65"/>
      <stop offset="72%" stop-color="#6FCDDD" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#B8EAF2" stop-opacity="0.12"/>
